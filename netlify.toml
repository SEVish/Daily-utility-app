[build]
  publish = "build"
  command = "npm run build"

[build.environment]
  REACT_APP_NEWS_API_KEY = "your_news_api_key_here"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true